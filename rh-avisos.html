<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Avisos</title>
    <link rel="stylesheet" href="../css/geral.css">
    <link rel="stylesheet" href="../css/rh-avisos.css">
</head>
<body>
    <!-- BARRA -->
    <nav class="barra">
        <button class="menu-btn" id="btn-menu">☰ Menu</button>
        <img src="../images/Logo Fundo Preto.png" alt="Logo" class="logo">
        <button class="avatar-btn" id="btn-avatar">Nome</button>
    </nav>
    <!-- MENU LATERAL -->
    <div class="menu-lateral escondido" id="menu-lateral">
        <a href="../pages/registro-de-ponto.html">Registrar Ponto</a>
        <a href="../pages/horas-mensais.html">Horas Mensais</a>
        <a href="../pages/saldos.html">Saldos</a>
        <a href="../pages/mural.html">Mural</a><hr>
        <a href="../pages/rh-usuarios.html" class="link-rh">RH - Usuários</a>
        <a href="../pages/rh-registros.html" class="link-rh">RH - Registros</a>
        <a href="../pages/rh-avisos.html" class="link-rh">RH - Avisos</a>
    </div>
    <!-- MENU PERFIL -->
    <div class="menu-perfil escondido" id="menu-perfil">
        <a href="../pages/meu-perfil.html">Meu Perfil</a>
        <a href="#" id="btn-sair">Sair</a>
    </div>
    <!-- CONTEÚDO PRINCIPAL -->
    <main class="conteudo">
        <h1>Avisos do Mural</h1>
        <p class="subtitulo">Criação e acompanhamento de avisos do mural</p>
        <!-- CRIAR NOVO AVISO -->
        <div class="card">
            <p class="card-titulo">● Criar novo aviso</p>
            <div class="campo">
                <label for="av-titulo">TÍTULO</label>
                <input type="text" id="av-titulo" placeholder="Título do aviso">
            </div>
            <div class="campo">
                <label for="av-descricao">DESCRIÇÃO</label>
                <textarea id="av-descricao" placeholder="Conteúdo do aviso..."></textarea>
            </div>
            <div class="grade-2">
                <div class="campo">
                    <label for="av-tipo">TIPO</label>
                    <select id="av-tipo">
                        <option value="geral">Geral — visível a todos</option>
                        <option value="especifico">Específico — selecionar destinatários</option>
                    </select>
                </div>
                <!-- DESTINATÁRIOS -->
                <div id="campo-destinatarios" class="campo escondido">
                    <label>DESTINATÁRIOS</label>
                    <select id="select-destinatarios">
                        <option value="">Selecionar destinatário...</option>
                    </select>
                    <div id="tags-destinatarios" class="tags-container"></div>
                </div>
            </div>
            <p id="av-mensagem" class="alerta escondido"></p>
            <button class="botao" id="btn-publicar">Publicar aviso</button>
        </div>
        <!-- AVISOS PUBLICADOS -->
        <div class="card">
            <p class="card-titulo">● Avisos publicados</p>
            <div id="lista-avisos">
                <div class="vazio">Nenhum aviso publicado</div>
            </div>
        </div>
    </main>
    <!-- MODAL — VER VISUALIZAÇÕES -->
    <div class="modal-fundo escondido" id="modal-visualizacoes">
        <div class="modal">
            <p class="modal-titulo" id="modal-av-titulo">—</p>
            <p class="modal-subtitulo" id="modal-av-descricao"></p>
            <hr class="divisor">
            <p class="label-visualizacoes">VISUALIZAÇÕES</p>
            <div id="lista-visualizacoes"></div>
            <div class="modal-botoes">
                <button class="botao" id="btn-fechar-modal">Fechar</button>
            </div>
        </div>
    </div>
    <script src="../js/geral.js"></script>
    <script src="../js/rh-avisos.js"></script>
</body>
</html>
