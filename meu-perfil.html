<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <link rel="stylesheet" href="../css/geral.css">
    <link rel="stylesheet" href="../css/meu-perfil.css">
</head>
<body>
    <!-- BARRA -->
    <nav class="barra">
        <button class="menu-btn" id="btn-menu">☰ Menu</button>
        <img src="../images/Logo Fundo Preto.png" alt="Logo" class="logo">
        <button class="avatar-btn" id="btn-avatar">Nome</button>
    </nav>
    <!-- MENU LATERAL -->
    <div class="menu-lateral escondido" id="menu-lateral">
        <a href="../pages/registro-de-ponto.html">Registrar Ponto</a>
        <a href="../pages/horas-mensais.html">Horas Mensais</a>
        <a href="../pages/saldos.html">Saldos</a>
        <a href="../pages/mural.html">Mural</a><hr>
        <a href="../pages/rh-usuarios.html" class="link-rh">RH - Usuários</a>
        <a href="../pages/rh-registros.html" class="link-rh">RH - Registros</a>
        <a href="../pages/rh-avisos.html" class="link-rh">RH - Avisos</a>
    </div>
    <!-- MENU PERFIL -->
    <div class="menu-perfil escondido" id="menu-perfil">
        <a href="../pages/meu-perfil.html">Meu Perfil</a>
        <a href="#" id="btn-sair">Sair</a>
    </div>
    <!-- CONTEÚDO PRINCIPAL -->
    <main class="conteudo">
        <h1>Meu Perfil</h1>
        <p class="subtitulo">Visualização e edição de informações pessoais</p>
        <!-- CARD DE PERFIL -->
        <div class="card">
            <p class="card-titulo">● Meu Perfil</p>
            <!-- CAMPOS -->
            <div class="grade-2">
                <div class="campo">
                    <label for="perfil-nome">NOME</label>
                    <input type="text" id="perfil-nome" disabled>
                </div>
                <div class="campo">
                    <label for="perfil-email">EMAIL</label>
                    <input type="email" id="perfil-email" disabled>
                </div>
                <div class="campo">
                    <label for="perfil-nasc">DATA DE NASCIMENTO</label>
                    <input type="text" id="perfil-nasc" disabled>
                </div>
                <div class="campo">
                    <label for="perfil-cargo">CARGO</label>
                    <input type="text" id="perfil-cargo" disabled>
                </div>
                <div class="campo">
                    <label for="perfil-carga">CARGA HORÁRIA MENSAL</label>
                    <input type="text" id="perfil-carga" disabled>
                </div>
                <div class="campo">
                    <label for="perfil-tipo">TIPO DE ACESSO</label>
                    <input type="text" id="perfil-tipo" disabled>
                </div>
                <div class="campo">
                    <label for="perfil-senha">SENHA</label>
                    <input type="password" id="perfil-senha" disabled>
                </div>
            </div>
            <!-- MENSAGEM -->
            <p id="perfil-mensagem" class="alerta escondido"></p>
            <!-- BOTÃO EDITAR -->
            <div id="btn-editar-box">
                <button class="botao" id="btn-editar">Editar</button>
            </div>
            <!-- BOTÕES SALVAR E CANCELAR -->
            <div id="botoes-edicao" class="escondido botoes-edicao">
                <button class="botao" id="btn-cancelar">Cancelar</button>
                <button class="botao" id="btn-salvar">Salvar</button>
            </div>
        </div>
    </main>
    <script src="../js/geral.js"></script>
    <script src="../js/meu-perfil.js"></script>
</body>
</html>
